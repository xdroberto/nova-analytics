  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

),rgba(11,13,30,.8));padding:32px;transition:transform .3s,border-color .3s,box-shadow .3s\" style-hover=\"transform:translateY(-4px);border-color:rgba(148,163,255,.3);box-shadow:0 24px 60px rgba(0,0,0,.4)\" style-before=\"content:'';position:absolute;inset:0;background:radial-gradient(280px circle at var(--mx,50%) var(--my,0%),rgba(108,92,231,.16),transparent 65%);opacity:0;transition:opacity .35s;pointer-events:none\">\n        <div style=\"width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(34,211,238,.09);border:1px solid rgba(34,211,238,.22);margin-bottom:22px\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#22d3ee\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2L4.5 13.5H11L10 22l8.5-11.5H12z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Sora',sans-serif;font-size:19px;font-weight:600;letter-spacing:-.015em;color:#fff;margin:0 0 10px\">Fast setup<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#9aa3c7;margin:0\">From clone to first insight in minutes, not sprints. One binary, one config, zero ceremony.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ metrics band ══════════ -->\n  <section id=\"metrics\" style=\"position:relative;z-index:1;border-top:1px solid rgba(148,163,255,.08);border-bottom:1px solid rgba(148,163,255,.08);background:rgba(12,14,32,.4)\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:72px 32px;display:grid;grid-template-columns:repeat(3,1fr);gap:48px;text-align:center\">\n      <div data-reveal=\"\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:52px;font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1\"><span data-count=\"99.99\" data-decimals=\"2\">0<\u002Fspan><span style=\"color:#7c6cf0\">%<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:12px;font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;color:#6b7499\">Uptime, last 12 months<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:52px;font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1\"><span data-count=\"340\" data-decimals=\"0\">0<\u002Fspan><span style=\"color:#22d3ee\">ms<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:12px;font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;color:#6b7499\">Median query, P50<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:52px;font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1\"><span data-count=\"1200\" data-decimals=\"0\">0<\u002Fspan><span style=\"color:#7c6cf0\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:12px;font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;color:#6b7499\">Teams reading clearly<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ CTA ══════════ -->\n  <section id=\"cta\" style=\"position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:120px 32px\">\n    <div data-reveal=\"\" style=\"position:relative;overflow:hidden;border-radius:24px;border:1px solid rgba(148,163,255,.16);background:linear-gradient(180deg,rgba(22,26,54,.8),rgba(10,12,28,.9));padding:88px 48px;text-align:center\">\n      <div data-anim=\"\" style=\"position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:640px;height:360px;border-radius:50%;background:radial-gradient(ellipse,rgba(108,92,231,.32),transparent 65%);filter:blur(50px);animation:nvPulse 5s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative\">\n        <h2 style=\"font-family:'Sora',sans-serif;font-size:clamp(34px,3.8vw,50px);font-weight:700;letter-spacing:-.03em;color:#fff;margin:0 0 18px\">Start seeing clearly<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.65;color:#9aa3c7;max-width:420px;margin:0 auto 40px\">Create your workspace and turn tonight's numbers into tomorrow's plan.<\u002Fp>\n        <div style=\"display:flex;justify-content:center;gap:14px\">\n          <a href=\"#\" style=\"font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,#6c5ce7,#5646d6);padding:16px 34px;border-radius:12px;box-shadow:0 0 0 1px rgba(255,255,255,.15) inset,0 16px 44px rgba(108,92,231,.5);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s\" style-hover=\"transform:translateY(-2px) scale(1.02);box-shadow:0 0 0 1px rgba(255,255,255,.25) inset,0 22px 56px rgba(108,92,231,.7);color:#fff\">Get started — it's free<\u002Fa>\n          <a href=\"#\" style=\"font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#e8eaf6;border:1px solid rgba(148,163,255,.2);padding:15px 30px;border-radius:12px;transition:border-color .25s,background .25s\" style-hover=\"border-color:rgba(148,163,255,.45);background:rgba(148,163,255,.07);color:#fff\">Talk to sales<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px;font-size:13px;color:#5a6288\">No credit card required · Deploy in your own cloud<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ footer ══════════ -->\n  <footer style=\"position:relative;z-index:1;border-top:1px solid rgba(148,163,255,.08)\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:40px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2 L14.2 9.8 L22 12 L14.2 14.2 L12 22 L9.8 14.2 L2 12 L9.8 9.8 Z\" fill=\"#8b9cf5\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Sora',sans-serif;font-weight:600;font-size:14px;color:#c7cdea\">Nova Analytics<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px;font-size:13.5px\">\n        <a href=\"#\" style=\"color:#8089ad;transition:color .2s\" style-hover=\"color:#fff\">Log in<\u002Fa>\n        <a href=\"#\" style=\"color:#8089ad;transition:color .2s\" style-hover=\"color:#fff\">Sign up<\u002Fa>\n        <a href=\"#\" style=\"color:#8089ad;transition:color .2s\" style-hover=\"color:#fff\">Security<\u002Fa>\n        <a href=\"#\" style=\"color:#8089ad;transition:color .2s\" style-hover=\"color:#fff\">Docs<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#5a6288\">© 2026 Nova Analytics<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  navRef = React.createRef();\n  starsRef = React.createRef();\n  heroCardRef = React.createRef();\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      navRef: this.navRef,\n      starsRef: this.starsRef,\n      heroCardRef: this.heroCardRef\n    };\n  }\n\n  componentDidMount() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    const reduce = (this.props.reduceMotion ?? false) || window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    if (reduce) {\n      root.querySelectorAll('[data-anim]').forEach(el => { el.style.animation = 'none'; });\n    }\n\n    // ── scroll reveal ──\n    const revealEls = root.querySelectorAll('[data-reveal]');\n    revealEls.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1)';\n    });\n    const pendingReveal = new Set(revealEls);\n    const revealNow = (el, i) => {\n      el.style.transitionDelay = (Math.min(i, 4) * 90) + 'ms';\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n      pendingReveal.delete(el);\n    };\n    const checkReveals = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      let i = 0;\n      pendingReveal.forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.92 && r.bottom > 0) revealNow(el, i++);\n      });\n    };\n\n    // ── nav glass on scroll ──\n    const nav = this.navRef.current;\n    this._onScroll = () => {\n      const on = window.scrollY > 24;\n      if (nav) {\n        nav.style.background = on ? 'rgba(6,7,16,.72)' : 'transparent';\n        nav.style.backdropFilter = on ? 'blur(18px)' : 'none';\n        nav.style.borderBottomColor = on ? 'rgba(148,163,255,.1)' : 'transparent';\n      }\n      checkReveals();\n      checkCounts();\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n\n    // ── card mouse glow ──\n    root.querySelectorAll('[data-glow]').forEach(card => {\n      card.addEventListener('mousemove', ev => {\n        const r = card.getBoundingClientRect();\n        card.style.setProperty('--mx', ((ev.clientX - r.left) / r.width * 100) + '%');\n        card.style.setProperty('--my', ((ev.clientY - r.top) / r.height * 100) + '%');\n        card.style.setProperty('--glow-on', '1');\n      });\n      // opacity of ::before is controlled via inline var — toggle through style rule\n      card.addEventListener('mouseenter', () => card.style.setProperty('--mx', '50%'));\n    });\n    // enable ::before glow on hover by injecting a tiny rule keyed to data-glow\n    const st = document.createElement('style');\n    st.textContent = '[data-glow]:hover::before{opacity:1 !important}';\n    document.head.appendChild(st);\n    this._glowStyle = st;\n\n    // ── hero card 3D tilt ──\n    const hc = this.heroCardRef.current;\n    if (hc && !reduce) {\n      const wrap = hc.parentElement;\n      wrap.addEventListener('mousemove', ev => {\n        const r = wrap.getBoundingClientRect();\n        const rx = ((ev.clientY - r.top) / r.height - 0.5) * -7;\n        const ry = ((ev.clientX - r.left) / r.width - 0.5) * 9;\n        hc.style.animation = 'none';\n        hc.style.transform = 'rotateX(' + rx.toFixed(2) + 'deg) rotateY(' + ry.toFixed(2) + 'deg)';\n      });\n      wrap.addEventListener('mouseleave', () => {\n        hc.style.transform = '';\n        hc.style.animation = '';\n      });\n    }\n\n    // ── count-up metrics (rect-based, IO unreliable here) ──\n    const pendingCounts = new Set(root.querySelectorAll('[data-count]'));\n    const runCount = el => {\n      const target = parseFloat(el.getAttribute('data-count'));\n      const dec = parseInt(el.getAttribute('data-decimals') || '0', 10);\n      const dur = 1600, t0 = performance.now();\n      const fmt = v => dec ? v.toFixed(dec) : Math.round(v).toLocaleString('en-US');\n      const tick = now => {\n        const p = Math.min((now - t0) / dur, 1);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = fmt(target * eased);\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    };\n    const checkCounts = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      pendingCounts.forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.92 && r.bottom > 0) {\n          pendingCounts.delete(el);\n          runCount(el);\n        }\n      });\n    };\n    // initial + late-layout passes\n    this._onScroll();\n    setTimeout(this._onScroll, 400);\n    setTimeout(this._onScroll, 1200);\n\n    // ── starfield canvas ──\n    const cv = this.starsRef.current;\n    if (cv) {\n      const ctx = cv.getContext('2d');\n      let stars = [];\n      const resize = () => {\n        cv.width = window.innerWidth;\n        cv.height = window.innerHeight;\n        const n = Math.floor(cv.width * cv.height / 16000);\n        stars = Array.from({ length: n }, () => ({\n          x: Math.random() * cv.width,\n          y: Math.random() * cv.height,\n          r: Math.random() * 1.1 + 0.3,\n          ph: Math.random() * Math.PI * 2,\n          sp: 0.4 + Math.random() * 0.8\n        }));\n      };\n      resize();\n      window.addEventListener('resize', resize);\n      this._onResize = resize;\n      const draw = t => {\n        ctx.clearRect(0, 0, cv.width, cv.height);\n        for (const s of stars) {\n          const a = 0.15 + 0.35 * (0.5 + 0.5 * Math.sin(s.ph + t / 1000 * s.sp));\n          ctx.globalAlpha = a;\n          ctx.fillStyle = '#aab6ff';\n          ctx.beginPath();\n          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);\n          ctx.fill();\n        }\n        this._raf = reduce ? null : requestAnimationFrame(draw);\n        if (reduce) { /* single static frame */ }\n      };\n      this._raf = requestAnimationFrame(draw);\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n    if (this._countIO) this._countIO.disconnect();\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._glowStyle) this._glowStyle.remove();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
