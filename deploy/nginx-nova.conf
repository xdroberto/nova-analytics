# Pre-TLS template. `certbot --nginx -d nova.robertobh.dev` rewrites this file on
# the VPS in place (adds the 443 server block + HTTP->HTTPS redirect). The live
# server config therefore diverges from this template by the certbot-managed lines;
# this file documents the app-level proxy intent, not the final on-disk state.
server {
    server_name nova.robertobh.dev;
    # Headroom for future form/file uploads (nginx default is 1M).
    client_max_body_size 10m;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    listen 80;
}
