name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
jobs:
  commits:
    # repo-steward gate: conventional-commit check on the PR's OWN commits only.
    # Scoped to base..head via the SHAs GitHub provides — NEVER the full/inherited
    # upstream history (which is non-conventional and would fail on ancestry).
    # Runs on PRs only; the merge-ref checkout + fetch-depth 0 makes both SHAs reachable.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: bash scripts/branding-check.sh
      - run: npm run build
  e2e:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: nova, POSTGRES_PASSWORD: novadev, POSTGRES_DB: nova }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nova" --health-interval 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://nova:novadev@localhost:5432/nova
      BETTER_AUTH_SECRET: ci-only-secret-not-production
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # --force: drizzle-kit push silently no-ops in non-TTY without it
      - run: npx drizzle-kit push --force
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
