name: Deploy
on:
  push:
    branches: [main]
permissions: { contents: read, packages: write }
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with: { context: ., push: true, tags: "ghcr.io/${{ github.repository }}:latest" }
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/nova
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d
            sleep 8
            curl -fsS http://127.0.0.1:3000/api/health || (docker compose -f docker-compose.prod.yml logs --tail 50 web && exit 1)
            # Disk hygiene on the shared host: drop superseded image layers after every deploy.
            docker image prune -f
