name: Deploy
on:
  push:
    branches: [main]
  # Manual build-only run: produces the GHCR image without auto-deploying,
  # used for the first manual VPS deploy before push-to-deploy is wired.
  workflow_dispatch:
permissions: { contents: read, packages: write }
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tag by SHA (immutable rollback reference) as well as latest.
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
  deploy:
    needs: build-push
    # Only auto-deploy on push to main; workflow_dispatch just builds the image.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy/remote-deploy.sh
          target: /opt/nova
          strip_components: 1
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/nova/remote-deploy.sh
