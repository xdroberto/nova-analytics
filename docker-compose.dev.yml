services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: novadev
      POSTGRES_DB: nova
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      retries: 10
volumes:
  pgdata:
